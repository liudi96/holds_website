<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>持仓管理台</title>
    <link rel="stylesheet" href="./styles.css?v=stock-detail-1" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">¥</div>
        <div>
          <strong>持仓管理台</strong>
          <span>Portfolio Desk</span>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="overview" title="总览">
          <span class="nav-icon">⌂</span>
          总览
        </button>
        <button class="nav-item" data-view="positions" title="持仓">
          <span class="nav-icon">▦</span>
          持仓
        </button>
        <button class="nav-item" data-view="trades" title="交易">
          <span class="nav-icon">＋</span>
          交易
        </button>
        <button class="nav-item" data-view="candidates" title="候选池">
          <span class="nav-icon">○</span>
          候选池
        </button>
      </nav>

      <div class="sidebar-footer">
        <span>本地数据</span>
        <strong id="recordCount">0 条记录</strong>
      </div>
    </aside>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Stock Portfolio</p>
          <h1 id="pageTitle">股票持仓管理</h1>
        </div>
        <div class="topbar-actions">
          <div class="search-wrap">
            <span>⌕</span>
            <input id="searchInput" type="search" placeholder="搜索代码或名称" />
          </div>
          <button class="icon-button" id="seedButton" title="载入示例数据">↺</button>
          <button class="primary-button" id="openTradePanel">
            <span>＋</span>
            新增交易
          </button>
        </div>
      </header>

      <section class="page active" data-page="overview">
        <section class="metrics-grid" aria-label="资产概览">
          <article class="metric">
            <span>总市值</span>
            <strong id="totalValue">¥0.00</strong>
            <small id="positionCount">0 只股票</small>
          </article>
          <article class="metric">
            <span>浮动盈亏</span>
            <strong id="totalPnl">¥0.00</strong>
            <small id="totalPnlRate">0.00%</small>
          </article>
          <article class="metric">
            <span>今日变动</span>
            <strong id="dayChange">¥0.00</strong>
            <small id="dayChangeRate">0.00%</small>
          </article>
          <article class="metric">
            <span>现金余额</span>
            <strong id="cashBalance">¥0.00</strong>
            <small>可用于新交易</small>
          </article>
        </section>

        <section class="overview-grid">
          <section class="panel">
            <div class="panel-head compact">
              <div>
                <p class="eyebrow">Allocation</p>
                <h2>资产分布</h2>
              </div>
            </div>
            <div class="allocation-chart" id="allocationChart"></div>
          </section>

          <section class="panel">
            <div class="panel-head compact">
              <div>
                <p class="eyebrow">Plan</p>
                <h2>执行优先级</h2>
              </div>
            </div>
            <div class="plan-list" id="overviewPlanList"></div>
          </section>
        </section>
      </section>

      <section class="page" data-page="positions">
        <div class="main-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Positions</p>
              <h2>当前持仓</h2>
            </div>
            <div class="segmented">
              <button class="segment active" data-filter="all">全部</button>
              <button class="segment" data-filter="profit">盈利</button>
              <button class="segment" data-filter="loss">亏损</button>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>股票</th>
                  <th>数量</th>
                  <th>成本</th>
                  <th>最新价</th>
                  <th>市值</th>
                  <th>盈亏</th>
                  <th>安全边际</th>
                  <th>质量</th>
                  <th>仓位</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="positionsBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="page" data-page="trades">
        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Trades</p>
              <h2>交易流水</h2>
            </div>
            <button class="primary-button" id="openTradePanelSecondary">
              <span>＋</span>
              新增交易
            </button>
          </div>
          <div class="trade-list trade-list-page" id="tradeList"></div>
        </section>
      </section>

      <section class="page" data-page="candidates">
        <section class="panel">
          <div class="panel-head compact">
            <div>
              <p class="eyebrow">Watchlist</p>
              <h2>候选池</h2>
            </div>
          </div>
          <div class="candidate-list candidate-page" id="candidateList"></div>
        </section>
      </section>

      <section class="page" data-page="stock-detail">
        <div id="stockDetail"></div>
      </section>
    </main>

    <dialog class="trade-dialog" id="tradeDialog">
      <form id="tradeForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">New Trade</p>
            <h2>新增交易</h2>
          </div>
          <button class="icon-button" type="button" id="closeTradePanel" title="关闭">×</button>
        </div>

        <div class="form-grid">
          <label>
            股票代码
            <input name="symbol" placeholder="AAPL" required />
          </label>
          <label>
            股票名称
            <input name="name" placeholder="Apple" required />
          </label>
          <label>
            交易方向
            <select name="side" required>
              <option value="buy">买入</option>
              <option value="sell">卖出</option>
            </select>
          </label>
          <label>
            币种
            <select name="currency" required>
              <option value="CNY">CNY</option>
              <option value="HKD">HKD</option>
              <option value="USD">USD</option>
            </select>
          </label>
          <label>
            数量
            <input name="shares" type="number" min="1" step="1" required />
          </label>
          <label>
            成交价
            <input name="price" type="number" min="0.01" step="0.01" required />
          </label>
          <label>
            最新价
            <input name="currentPrice" type="number" min="0.01" step="0.01" required />
          </label>
        </div>

        <div class="dialog-actions">
          <button type="button" class="ghost-button" id="cancelTrade">取消</button>
          <button type="submit" class="primary-button">保存交易</button>
        </div>
      </form>
    </dialog>

    <dialog class="trade-dialog" id="holdingDialog">
      <form id="holdingForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Excel Holding</p>
            <h2>编辑持仓信息</h2>
          </div>
          <button class="icon-button" type="button" id="closeHoldingPanel" title="关闭">×</button>
        </div>

        <input type="hidden" name="symbol" />
        <div class="form-grid">
          <label>
            股票名称
            <input name="name" required />
          </label>
          <label>
            行业/类型
            <input name="industry" />
          </label>
          <label>
            最终动作
            <input name="action" />
          </label>
          <label>
            是否达标
            <input name="status" />
          </label>
          <label>
            安全边际
            <input name="marginOfSafety" type="number" step="0.001" />
          </label>
          <label>
            质量总分
            <input name="qualityScore" type="number" min="0" max="100" step="1" />
          </label>
          <label class="wide-field">
            数据来源/备注
            <textarea name="notes" rows="4"></textarea>
          </label>
        </div>

        <div class="dialog-actions">
          <button type="button" class="ghost-button" id="cancelHolding">取消</button>
          <button type="submit" class="primary-button">保存信息</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js?v=stock-detail-1"></script>
  </body>
</html>
